<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Tech</title>
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- Styls -->
      <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class=" container mx-auto ">
        <h2 class="text-[#15803D] text-3xl text-center">Choose Your Trees</h2>

        <div class="grid grid-cols-12 gap-8">

            <!-- CATAGORYS -->
            <div class="bg-white card card-body shadow-2xl rounded-lg col-span-3 ">
                <h2 id="all-tree-btn" class="font-black text-2xl text-center">Catagorys</h2>
                <div class="space-y-3 sticky top-">
                    <button class="btn btn-success w-full" id="all-Categorys-btn">All Categorys</button>

                    <div id="categorys-container" class="space-y-3">
                        <!-- caregory button load by api -->
                    </div>
                </div>
            </div>

            <!-- Trees -->
            <div class="bg-white card card-body shadow-2xl col-span-6" >
                <div id="tree-container" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <!-- Dynamically added -->
                    <!-- <div class="card bg-base-100  shadow-sm">
                        <figure>
                            <img
                            src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                            alt="Shoes" />
                        </figure>
                        
                        <div class="card-body">
                            <h2 class="card-title text-[#15803D]">Card Title</h2>
                            <p class="line-clamp-2">A card component has a figure, a body part, and inside body there are title and actions parts</p>
                            <div class="badge badge-soft outline badge-success">Fruit Tree</div>

                            <div class="card-actions  justify-between items-center">
                                <h2 class="text-2xl font-bold text-[#15803D]">$5000</h2>
                            <button class="btn btn-success text-white">Buy Now</button>
                            </div>
                        </div>
                    </div> -->
                </div>

                <!-- Loading Spinner -->
                <div id="load-spinner" class="h-[60vh] hidden flex justify-center items-center">
                    <span class="loading loading-spinner loading-xl "></span>
                </div>

            </div>

            <!-- Cart -->
            <di class="bg-white card card-body shadow-2xl col-span-3">
                <h2 class="font-bold text-3xl mb-2">Cart</h2>

                <div class="space-y-4">
                    <div id="cart-container" class="space-y-4">
                        <!-- Dynamically input -->
                        <!-- <div class="card card-body shadow-sm">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h2>Name</h2>
                                    <p>2000 Tk * 10</p>
                                </div>
                                <button class="btn btn-ghost">X</button>
                            </div>
                            <p class="text-right font-semibold text-xl">500 TK</p>
                        </div> -->

                    </div>

                    <!-- Total ammount -->
                     <div class="flex justify-between items-center bg-green-50 font-semibold rounded-lg p-4 my-3">
                        <span>Total:</span>
                        <span   class="total-price">0 TK</span>
                     </div>

                </div>
            </di>
        </div>

    <!-- Product details Modal -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
        <dialog id="tree-details-modal" class="modal">
        <div class="modal-box">
            
            <!-- Modal header with close button -->
            <div class="flex justify-between items-start mb-4">
                <h3 class="font-bold text-2xl text-green-700 " id="modal-title">Tree Details</h3>
                <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('plantModal')">X</button>
            </div>

                <!-- Modal content -->
                <div class="gap-6">
                    <!-- PLANT IMAGE -->
                    <img id="modal-image" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">
                
                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-smtext-gray-500 mb-2">
                            <span class="font-bold">Category: </span>
                            <span id="modal-category" class="badge badge-outline badge-success"></span>
                        </p>

                        <p class="text-smtext-gray-600 mb-4">
                            <span id="modal-description"></span>
                        </p>

                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3x1 font-bold text-green-600">TK <span id="modal-price">0</span>
                        </div>

                    </div>
                </div>

            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
            </form>
            </div>
        </div>
        </dialog>

    </main>
    



    <script src="./script.js"></script>
</body>
</html>
