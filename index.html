                    <div id="categorys-container" class="space-y-3">
                        <!-- caregory button load by api -->
                    </div>
                </div>
            </div>

            <!-- Trees -->
            <div class="bg-white card card-body shadow-2xl col-span-6" >
                <div id="tree-container" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <!-- Dynamically added -->
                    <!-- <div class="card bg-base-100  shadow-sm">
                        <figure>
                            <img

                            alt="Shoes" />
                        </figure>
                        
                        <div class="card-body">
                            <h2 class="card-title text-[#15803D]">Card Title</h2>
                            <p class="line-clamp-2">A card component has a figure, a body part, and inside body there are title and actions parts</p>

                            </div>
                        </div>
                    </div> -->
                </div>

                <!-- Loading Spinner -->
                <div id="load-spinner" class="h-[60vh] hidden flex justify-center items-center">
                    <span class="loading loading-spinner loading-xl "></span>
                </div>

            </div>

            <!-- Cart -->
            <di class="bg-white card card-body shadow-2xl col-span-3">Cart</di>
        </div>

    <!-- Product details Modal -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
        <dialog id="tree-details-modal" class="modal">
        <div class="modal-box">
            
            <!-- Modal header eith close button -->
             <div>
                <h3 class="flex justify-between items-start mb-4">Tree Details</h3>
                <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('plantModal')">X</button>
             </div>

             <!-- Modal content -->
             <div class="gap-6">



            <!-- Plant Details -->
            <div class="">
                <p class="text-smtext-gray-500 mb-2">
                    <span class="font-bold">Category:</span>
                    <span id="modalCategory" class="badge badge-primary"></span>
                </p>

                <p class="text-smtext-gray-600 mb-4">
                    <span id="modalDescription"></span>
                </p>

                <div class="flex items-baseline gap-2 mb-6">
                    <span class="text-3x1 font-bold text-green-600">$<span id="modalPrice">0</span>
                </div>

             </div>

            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
            </form>
            </div>
        </div>
        </dialog>
